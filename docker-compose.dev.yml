name: uchicode-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uchicode_dev
      POSTGRES_USER: uchicode
      POSTGRES_PASSWORD: uchicode_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uchicode -d uchicode_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DJANGO_SECRET_KEY: dev-only-uchicode-secret-key-change-me-32
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgres://uchicode:uchicode_dev_password@postgres:5432/uchicode_dev
      REDIS_URL: redis://redis:6379/1
      DJANGO_SECURE_SSL: "False"
      DJANGO_SESSION_COOKIE_SECURE: "False"
      DJANGO_CSRF_COOKIE_SECURE: "False"
      DJANGO_SECURE_SSL_REDIRECT: "False"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./site
    command: npm run dev -- --host 0.0.0.0
    environment:
      DEV_API_PROXY_TARGET: http://backend:8000
      VITE_API_BASE_URL: /api
    ports:
      - "5173:5173"
    volumes:
      - ./site:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_dev_data:
  redis_dev_data:
  frontend_node_modules:
