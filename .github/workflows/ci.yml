name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ci-only-uchicode-secret-key-change-me-32
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      QWEN_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django checks
        run: python manage.py check

      - name: Backend tests
        run: python manage.py test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dev Compose config
        run: docker compose -f docker-compose.dev.yml config --quiet

      - name: Prepare example production env
        run: cp .env.production.example .env.production

      - name: Check prod Compose config
        run: docker compose -f docker-compose.prod.yml config --quiet
